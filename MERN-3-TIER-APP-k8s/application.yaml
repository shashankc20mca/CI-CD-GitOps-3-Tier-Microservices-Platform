apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application1
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/shashankc20mca/CI-CD-GitOps-3-Tier-Microservices-Platform.git
    targetRevision: main
    path: MERN-3-TIER-APP-k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true


